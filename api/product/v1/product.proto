syntax = "proto3";

package api.product.v1;

import "google/api/annotations.proto";
option go_package = "seckill/api/product/v1;v1";
option java_multiple_files = true;
option java_package = "api.product.v1";

service Product {
  rpc Seckill(SeckillReq) returns (SeckillResp) {
    option (google.api.http) = {
        post: "/api/seckill"
        body: "*"
    };
  }
  rpc DeductStockSaga(DeductStockSagaReq) returns (DeductStockSagaResp) {
   option (google.api.http) = {
     post: "/api/seckill/saga/deductStock"
     body: "*"
    };
  }
  rpc RestoreStock(RestoreStockReq) returns (RestoreStockResp) {}
}

enum Result {
  SUCCESS = 0;
  FAILURE = 1;
}

message SeckillReq {
  int64 userID = 1;
}
message SeckillResp {
  Result res = 1;
}
message DeductStockSagaReq {
   int64 productID = 1;
   int32 amount = 2;
 }
 message DeductStockSagaResp {
   bool success = 1;
 }
 message RestoreStockReq {
   int64 productID = 1;
   int32 amount = 2;
 }
 message RestoreStockResp {
   bool success = 1;
 }
