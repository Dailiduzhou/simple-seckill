services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: seckill
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/pg-init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  etcd:
    image: bitnami/etcd:3.5
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
    ports:
      - "2379:2379"

  product:
    build:
      context: .
      dockerfile: app/product/Dockerfile
    ports:
      - "8000:8000"
      - "9000:9000"
    volumes:
      - ./app/product/configs:/data/conf
      - product_logs:/app/logs
    depends_on:
      - postgres

  user:
    build:
      context: .
      dockerfile: app/user/Dockerfile
    ports:
      - "8001:8000"
      - "9001:9000"
    volumes:
      - ./app/user/configs:/data/conf
      - user_logs:/app/logs
    depends_on:
      - postgres

  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:2.9.0
    volumes:
      - ./deploy/promtail.yaml:/etc/promtail/config.yaml
      - user_logs:/logs/user
      - product_logs:/logs/product
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    depends_on:
      - loki

  jaeger:
    image: jaegertracing/all-in-one:1.68.0
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  pgdata:
  user_logs:
  product_logs:

