apiVersion: v1
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: user
        static_configs:
          - targets: [localhost]
            labels:
              job: user
              __path__: /logs/user/*.log

      - job_name: product
        static_configs:
          - targets: [localhost]
            labels:
              job: product
              __path__: /logs/product/*.log
kind: ConfigMap
metadata:
  annotations:
    use-subpath: "true"
  labels:
    io.kompose.service: promtail
  name: promtail-cm0
