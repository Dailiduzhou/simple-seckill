apiVersion: v1
data:
  config.yaml: |
    server:
      http:
        addr: 0.0.0.0:8000
        timeout: 3s
      grpc:
        addr: 0.0.0.0:9000
        timeout: 3s
    data:
      database:
        driver: postgres
        source: postgres://postgres:postgres@postgres:5432/seckill?sslmode=disable
      redis:
        addr: redis:6379
        read_timeout: 0.2s
        write_timeout: 0.2s
    registry:
      etcd:
        endpoints:
          - "etcd:2379"
    dtm:
      addr: dtm:36790
    trace:
      endpoint: jaeger:4317
kind: ConfigMap
metadata:
  labels:
    io.kompose.service: user
  name: user-cm0
