apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    io.kompose.service: grafana
  name: grafana-dashboard-provider
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: seckill
        orgId: 1
        folder: Seckill
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards/seckill

