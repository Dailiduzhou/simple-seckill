apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    io.kompose.service: grafana
  name: grafana-datasources
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki:3100
        isDefault: true
        editable: true
        jsonData:
          maxLines: 1000
          derivedFields:
            - name: traceID
              matcherRegex: '"trace\.id":"([^"]+)"'
              datasourceUid: jaeger
              url: '$${__value.raw}'
      - name: Jaeger
        uid: jaeger
        type: jaeger
        access: proxy
        url: http://jaeger:16686
        editable: true

