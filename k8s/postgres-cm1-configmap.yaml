apiVersion: v1
data:
  init.sql: |
    -- 创建产品表
    CREATE TABLE products (
      id BIGSERIAL PRIMARY KEY,
      price INT NOT NULL DEFAULT 1000,
      stock INT NOT NULL DEFAULT 5
    );

    -- 创建用户表
    CREATE TABLE users (
      id BIGSERIAL PRIMARY KEY,
      balance INT NOT NULL DEFAULT 1000
    );

    -- 插入一个 id=1 的产品，其余字段使用默认值
    INSERT INTO products (id, price, stock) VALUES (1, 1000, 5);

    -- 重置序列，避免后续插入时 id 冲突（因为手动指定了 id=1）
    SELECT setval('products_id_seq', 1, true);

    -- 批量插入 20 个用户（全部使用默认值）
    DO $$
    BEGIN
      FOR i IN 1..20 LOOP
        INSERT INTO users DEFAULT VALUES;
      END LOOP;
    END $$;
kind: ConfigMap
metadata:
  labels:
    io.kompose.service: postgres
  name: postgres-cm1
